<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crypto Support Funnel</title>

<style>
body { margin:0; font-family:Arial; background:#070b14; color:white; }

.urgency {
  background:#ef4444;
  text-align:center;
  padding:10px;
  font-size:13px;
}

.hero {
  padding:50px 20px;
  text-align:center;
  background: radial-gradient(circle at top, #1a2544, #070b14);
}

.cta {
  display:inline-block;
  margin-top:15px;
  padding:14px 20px;
  background:#25D366;
  color:white;
  text-decoration:none;
  border-radius:8px;
}

.section {
  padding:25px 20px;
  max-width:900px;
  margin:auto;
}

.card {
  background:#121a2f;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.floating {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:14px;
  border-radius:50px;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="urgency">
⚠ Limited crypto onboarding slots available today
</div>

<!-- VARIANT A -->
<div id="A">
  <div class="hero">
    <h2>Crypto Wallet & Trading Support</h2>
    <p>Secure setup and guided trading</p>
    <a class="cta" href="#" onclick="sendToWhatsApp('general')">Start Now</a>
  </div>
</div>

<!-- VARIANT B -->
<div id="B" style="display:none;">
  <div class="hero">
    <h2>Elite Crypto Support System</h2>
    <p>Fast setup, pro-level guidance</p>
    <a class="cta" href="#" onclick="sendToWhatsApp('general')">Get Access</a>
  </div>
</div>

<!-- SERVICES -->
<div class="section">
  <h2>Choose Service</h2>

  <div class="card">
    Wallet Setup
    <br><br>
    <a class="cta" href="#" onclick="sendToWhatsApp('Wallet Setup')">Select</a>
  </div>

  <div class="card">
    Exchange Guidance
    <br><br>
    <a class="cta" href="#" onclick="sendToWhatsApp('Exchange Guidance')">Select</a>
  </div>

  <div class="card">
    Trading Support
    <br><br>
    <a class="cta" href="#" onclick="sendToWhatsApp('Trading Support')">Select</a>
  </div>

</div>

<!-- FLOATING BUTTON -->
<a class="floating" href="#" onclick="sendToWhatsApp('general')">
WhatsApp
</a>

<script>

/* STORAGE */
function getData() {
  return JSON.parse(localStorage.getItem("funnel")) || { variant:null };
}
function saveData(d) {
  localStorage.setItem("funnel", JSON.stringify(d));
}

/* SOURCE */
function getSource() {
  const p = new URLSearchParams(window.location.search);
  return p.get("src") || "direct";
}

/* A/B ASSIGN */
function assignVariant() {
  let d = getData();
  if (!d.variant) {
    d.variant = Math.random() < 0.5 ? "A" : "B";
    saveData(d);
  }
  return d.variant;
}

/* RENDER */
function render() {
  let v = assignVariant();
  document.getElementById("A").style.display = v === "A" ? "block" : "none";
  document.getElementById("B").style.display = v === "B" ? "block" : "none";
}
render();

/* WHATSAPP LEAD CAPTURE */
function sendToWhatsApp(service) {
  let d = getData();
  let variant = d.variant || "unknown";
  let source = getSource();

  let msg = `Hello, I'm interested in crypto support.

Service: ${service}
Source: ${source}
Variant: ${variant}

Please guide me.`;

  let url = "https://wa.me/15812923451?text=" + encodeURIComponent(msg);

  window.open(url, "_blank");
}

</script>

</body>
</html>
