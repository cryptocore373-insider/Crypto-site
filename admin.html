<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Leads</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="hero">
    <h1>Lead Dashboard</h1>
    <p>Crypto Insider System - Admin View</p>

    <button class="btn primary" onclick="loadLeads()">Refresh Leads</button>
</header>

<section class="features">
    <div id="leadContainer" class="card" style="width:90%; max-width:800px;"></div>
</section>

<script>
async function loadLeads() {
    const res = await fetch("http://127.0.0.1:3000/leads");
    const data = await res.json();

    const container = document.getElementById("leadContainer");

    if (data.length === 0) {
        container.innerHTML = "<p>No leads yet.</p>";
        return;
    }

    container.innerHTML = data.map(l => `
        <div style="padding:10px;border-bottom:1px solid #333;">
            <strong>${l.value}</strong><br>
            <small>${l.time}</small>
        </div>
    `).join("");
}

loadLeads();
</script>

</body>
</html>
